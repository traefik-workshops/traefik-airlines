openapi: 3.0.0
info:
  title: Anthropic Messages API
  description: |
    The Anthropic Messages API. See https://docs.anthropic.com/en/api/messages
    for full reference. This spec covers the endpoint used by Traefik Hub's
    messages-api middleware.
  version: "2023-06-01"
  termsOfService: https://www.anthropic.com/legal/commercial-terms
  contact:
    name: Anthropic Support
    url: https://support.anthropic.com/
  license:
    name: Proprietary
    url: https://www.anthropic.com/legal
servers:
  - url: https://api.anthropic.com/v1
tags:
  - name: Messages
    description: Send a structured list of input messages and receive a model-generated response.
paths:
  /messages:
    post:
      operationId: createMessage
      tags:
        - Messages
      summary: Create a message
      description: |
        Send a structured list of input messages with text and/or image content,
        and the model will generate the next message in the conversation.
      parameters:
        - name: anthropic-version
          in: header
          required: true
          description: The API version. See https://docs.anthropic.com/en/api/versioning.
          schema:
            type: string
            default: "2023-06-01"
        - name: anthropic-beta
          in: header
          required: false
          description: Optional beta feature flags (comma-separated).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Successful response. Either a complete Message or a stream of SSE events when `stream: true`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
            text/event-stream:
              schema:
                type: string
                description: Server-sent events stream of MessageStreamEvent frames.
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
        "529":
          $ref: "#/components/responses/Error"
      security:
        - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Anthropic API key. Create one at https://console.anthropic.com.
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    CreateMessageRequest:
      type: object
      required:
        - model
        - messages
        - max_tokens
      properties:
        model:
          type: string
          description: The model that will complete the prompt (e.g. `claude-opus-4-7`, `claude-sonnet-4-6`, `claude-haiku-4-5`).
          example: claude-opus-4-7
        messages:
          type: array
          description: Input messages — the conversation so far.
          items:
            $ref: "#/components/schemas/InputMessage"
        max_tokens:
          type: integer
          minimum: 1
          description: Maximum number of tokens to generate before stopping.
          example: 1024
        system:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/TextBlock"
          description: System prompt providing context and instructions.
        metadata:
          type: object
          description: Object describing the request metadata.
          properties:
            user_id:
              type: string
              description: External identifier for the user associated with the request.
        stop_sequences:
          type: array
          items:
            type: string
          description: Custom text sequences that will cause the model to stop generating.
        stream:
          type: boolean
          default: false
          description: Whether to incrementally stream the response using server-sent events.
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Amount of randomness injected into the response. Defaults to 1.
        top_p:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Use nucleus sampling.
        top_k:
          type: integer
          minimum: 0
          description: Only sample from the top K options for each subsequent token.
        tools:
          type: array
          description: Definitions of tools that the model may use.
          items:
            $ref: "#/components/schemas/Tool"
        tool_choice:
          $ref: "#/components/schemas/ToolChoice"
    InputMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ContentBlock"
    ContentBlock:
      oneOf:
        - $ref: "#/components/schemas/TextBlock"
        - $ref: "#/components/schemas/ImageBlock"
        - $ref: "#/components/schemas/ToolUseBlock"
        - $ref: "#/components/schemas/ToolResultBlock"
      discriminator:
        propertyName: type
        mapping:
          text: "#/components/schemas/TextBlock"
          image: "#/components/schemas/ImageBlock"
          tool_use: "#/components/schemas/ToolUseBlock"
          tool_result: "#/components/schemas/ToolResultBlock"
    TextBlock:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - text
        text:
          type: string
    ImageBlock:
      type: object
      required:
        - type
        - source
      properties:
        type:
          type: string
          enum:
            - image
        source:
          type: object
          required:
            - type
            - media_type
            - data
          properties:
            type:
              type: string
              enum:
                - base64
            media_type:
              type: string
              enum:
                - image/jpeg
                - image/png
                - image/gif
                - image/webp
            data:
              type: string
              format: byte
    ToolUseBlock:
      type: object
      required:
        - type
        - id
        - name
        - input
      properties:
        type:
          type: string
          enum:
            - tool_use
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true
    ToolResultBlock:
      type: object
      required:
        - type
        - tool_use_id
      properties:
        type:
          type: string
          enum:
            - tool_result
        tool_use_id:
          type: string
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ContentBlock"
        is_error:
          type: boolean
    Tool:
      type: object
      required:
        - name
        - input_schema
      properties:
        name:
          type: string
          description: Tool name — `^[a-zA-Z0-9_-]{1,64}$`.
        description:
          type: string
        input_schema:
          type: object
          description: JSON schema for this tool's input.
          additionalProperties: true
    ToolChoice:
      oneOf:
        - type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - auto
                - any
            disable_parallel_tool_use:
              type: boolean
        - type: object
          required:
            - type
            - name
          properties:
            type:
              type: string
              enum:
                - tool
            name:
              type: string
            disable_parallel_tool_use:
              type: boolean
    Message:
      type: object
      required:
        - id
        - type
        - role
        - content
        - model
        - stop_reason
        - usage
      properties:
        id:
          type: string
          description: Unique object identifier.
        type:
          type: string
          enum:
            - message
        role:
          type: string
          enum:
            - assistant
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContentBlock"
        model:
          type: string
          description: The model that handled the request.
        stop_reason:
          type: string
          nullable: true
          enum:
            - end_turn
            - max_tokens
            - stop_sequence
            - tool_use
            - pause_turn
            - refusal
            - model_context_window_exceeded
          description: The reason the model stopped generating.
        stop_sequence:
          type: string
          nullable: true
          description: Which custom stop sequence was generated, if any.
        usage:
          $ref: "#/components/schemas/Usage"
    Usage:
      type: object
      properties:
        input_tokens:
          type: integer
          description: Number of input tokens.
        output_tokens:
          type: integer
          description: Number of output tokens.
        cache_creation_input_tokens:
          type: integer
          nullable: true
          description: Input tokens used to create a new cache entry.
        cache_read_input_tokens:
          type: integer
          nullable: true
          description: Input tokens read from an existing cache entry.
    ErrorResponse:
      type: object
      required:
        - type
        - error
      properties:
        type:
          type: string
          enum:
            - error
        error:
          type: object
          required:
            - type
            - message
          properties:
            type:
              type: string
              enum:
                - invalid_request_error
                - authentication_error
                - permission_error
                - not_found_error
                - request_too_large
                - rate_limit_error
                - api_error
                - overloaded_error
            message:
              type: string
